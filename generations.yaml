generations:
  - name: "First Generation"
    start_year: 2005
    end_year: 2008
    description: "The original Buick LaCrosse debuted in late 2004 as a 2005 model, replacing the Century and Regal in North America as Buick's mid-size sedan. Known as the Buick Allure in Canada, it was built on GM's W-body platform. Engine options included a 3.8L V6 producing 200 HP and a more powerful 3.6L V6 with 240 HP. The interior emphasized comfort with spacious seating, wood trim, and a quiet cabin. Features included QuietTuning technology for noise reduction. This generation established the LaCrosse nameplate with conservative styling aimed at traditional Buick customers. Production ended December 23, 2008."

  - name: "First Generation (2008 Facelift)"
    start_year: 2008
    end_year: 2009
    description: "The LaCrosse received a facelift for 2008 with revised front design based on the Buick Velite concept. All trim levels received a chrome exterior appearance package, factory remote start, XM Satellite Radio, telescoping steering wheel, and redundant steering wheel and climate controls. The LaCrosse Super sub-model was introduced in 2008, featuring a 5.3L LS4 V8 engine producing 300 HP, making it a high-performance variant of the mid-size sedan. The Super featured Bilstein mono-tube struts, 18-inch wheels, and sport-tuned suspension. For 2009, heated outside mirrors became standard, and various comfort features were added. North American sales of the first generation reached roughly 290,000 units across model years 2005–2009."

  - name: "Second Generation"
    start_year: 2010
    end_year: 2013
    description: "Launched at the 2009 North American International Auto Show, the second-generation LaCrosse was completely redesigned as Buick's flagship sedan. Built on GM's Epsilon II platform (long-wheelbase variant), it featured contemporary styling influenced by the 2008 Buick Invicta concept. The design incorporated traditional Buick elements including VentiPorts and Sweepspears styling lines. Engine options included a 2.4L four-cylinder (from 2010) and a 3.6L V6 producing up to 280-303 HP depending on year. Front-wheel drive was standard with all-wheel drive available on V6 models. The 2010 model received IIHS Top Safety Pick recognition. Features included HiPer Strut suspension and Real Time Damping technology. This generation helped reposition Buick as a more modern premium brand."

  - name: "Second Generation (2014 Facelift)"
    start_year: 2014
    end_year: 2016
    description: "Buick unveiled a revised 2014 LaCrosse at the 2013 New York Auto Show, featuring a mid-cycle refresh. Changes included redesigned front and rear fascias, new wheel designs, and a reconfigurable eight-inch TFT LCD instrument cluster. Semi-aniline leather seating and radar-and camera-based safety features such as forward collision alert and side blind zone alert were added. All models featured eAssist mild-hybrid technology with a 2.4L four-cylinder engine producing 182 HP or a 3.6L V6 producing 303 HP. The 2016 model year added a Sport Touring Edition with unique 18-inch aluminum black pocket wheels and a rear lip spoiler. Production continued through 2016 at the Fairfax Assembly plant in Kansas City, Kansas."

  - name: "Third Generation"
    start_year: 2017
    end_year: 2019
    description: "The third-generation LaCrosse debuted at the 2015 LA Auto Show as a 2017 model, using the GM Epsilon (E2XX/P2XX) platform shared with the Chevrolet Impala. The platform switch and use of high-strength steels reduced weight by approximately 300 pounds despite growing in length and width. The exterior adopted a more dynamic appearance with a lower roofline and longer wheelbase. North American models were powered by either a 3.6L V6 producing 310 HP or a 2.5L four-cylinder with eAssist mild-hybrid technology. The 2017 model featured an eight-speed Aisin automatic transmission, while 2018-2019 models used a 9-speed GM 9T60 transmission. The interior offered premium materials, improved infotainment including Apple CarPlay and Android Auto, and advanced driver assistance features. North American production ended February 15, 2019, as Buick shifted focus to crossovers. The 2017 LaCrosse received IIHS Top Safety Pick recognition."

  - name: "Third Generation (2019 Facelift)"
    start_year: 2019
    end_year: 2023
    description: "A facelift was introduced for the 2019 model year, available in the Chinese market where the LaCrosse remained a best seller. The facelifted LaCrosse featured new powertrain options including a new 2.0-liter turbo engine delivering 237 HP and 258 lb-ft of torque, replacing earlier turbocharged and hybrid options. The 2019 LaCrosse was equipped with a nine-speed Hydra-Matic automatic transmission. From 2021 to 2023, a 1.5-liter turbocharged engine was introduced as the standard engine option. Trim levels were designated as 652T Elite, 652T Luxury, and 652T Distinguished (2019-2020), then 552T trim levels from 2021-2023. The facelift featured updated exterior styling with refined proportions and improved infotainment systems. Production in China continued through 2023."

  - name: "Fourth Generation"
    start_year: 2023
    end_year: 2024
    description: "In 2023, Buick unveiled the fourth-generation LaCrosse, adopting Buick's new Pure Design philosophy and corporate emblem. Built on the VSS-F platform (P2XX-2), this generation was manufactured and marketed solely in China. The fourth-generation LaCrosse was available in four trim levels: Beyond, Enjoy, Premium, and Avenir. Initially powered by a turbo 2.0-liter four-cylinder engine producing 237 HP, with a 1.5-liter turbocharged four-cylinder available for the base model. All models featured a 9-speed 9T50 Hydra-Matic automatic transmission. This generation marked the first LaCrosse with a column-style gear shifter compared to floor shifters used in previous generations. The new design represented a significant departure from previous generations with modern styling and updated infotainment systems."
